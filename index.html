  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%;

      position: fixed;
      width: 100%;
    }
    body {
      margin: 0;

    .display-serif { font-family: 'Playfair Display', 'Noto Serif Bengali', 'Amiri', serif; }
    .caps-spacing { letter-spacing: 0.2em; }
    .glass-header {

    }
    .manuscript-container { width:100%; max-width:780px; margin:0 auto; position:relative; }

      white-space:normal; word-break:break-word; overflow-wrap:break-word; max-width:100%;
    }
    .premium-highlight { display:inline; padding:0!important; margin:0!important; border:none!important; color:#000!important; border-radius:4px; box-decoration-break:clone; -webkit-box-decoration-break:clone; }
    .premium-highlight .md-bold-text { color:inherit!important; }
    .highlight-final { background-color:#b45309!important; cursor:pointer; }
    .highlight-pending { background-color:rgba(254,240,138,0.35)!important; animation:pulse-soft 2s infinite; }
    .md-marker { display:inline; font-size:0; line-height:0; opacity:0; width:0; height:0; pointer-events:none; user-select:all; }
    .md-hidden-nl { font-size:0; opacity:0; pointer-events:none; user-select:text; }
    .md-h1 { font-size:2.5rem; color:#e2e8f0; font-weight:800; line-height:1.2; margin-bottom:1.5rem; font-family:'Noto Serif Bengali','Playfair Display',serif; }
    .md-h2 { font-size:2rem; color:#cbd5e1; font-weight:700; line-height:1.3; margin-bottom:1.25rem; font-family:'Noto Serif Bengali','Playfair Display',serif; }
    .md-h3 { font-size:1.5rem; color:#94a3b8; font-weight:700; line-height:1.4; margin-bottom:1rem; }
    .md-h4 { font-size:1.15rem; color:#6b7280; font-weight:700; line-height:1.5; margin-bottom:0.75rem; letter-spacing:0.01em; }
    .md-list-item { position:relative; padding-left:1.75rem; margin-bottom:0.75rem; display:block; }
    .md-list-bullet { position:absolute; left:0.25rem; top:0.85rem; width:0.4rem; height:0.4rem; border-radius:50%; background-color:#4f46e5; box-shadow:0 0 6px rgba(79,70,229,0.3); }
    .md-bold-text { font-weight:800!important; }
    .katex { font-size:1.1em; }
    .katex-display { margin:1em 0; overflow-x:auto; overflow-y:hidden; }
    .custom-scrollbar::-webkit-scrollbar { width:4px; height:4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background:transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background:#18181b; border-radius:10px; }
    .table-scroll-container::-webkit-scrollbar { height:8px; }
    .table-scroll-container::-webkit-scrollbar-track { background:rgba(255,255,255,0.05); border-radius:4px; }
    .table-scroll-container::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2); border-radius:4px; }
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#18181b; border-radius:10px; }
    ::selection { background-color:rgba(79,70,229,0.4); color:#fff; }
    .no-scrollbar::-webkit-scrollbar { display:none; }
    .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
    @keyframes pulse-soft { 0%,100%{opacity:1} 50%{opacity:0.6} }

    .animate-spin { animation:spin 1s linear infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .animate-pulse { animation:pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(-25%);animation-timing-function:cubic-bezier(0.8,0,1,1)} 50%{transform:translateY(0);animation-timing-function:cubic-bezier(0,0,0.2,1)} }
    .animate-bounce { animation:bounce 1s infinite; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .animate-in { animation:fadeIn 0.3s ease-out; }
    @keyframes slideInBottom { from{transform:translateY(100%);opacity:0.6} to{transform:translateY(0);opacity:1} }
    .slide-in-from-bottom-full { animation:slideInBottom 0.42s cubic-bezier(0.22,1,0.36,1) both; }

    /* ── X-Ray Panel ── */
    @keyframes xrayReveal { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .xray-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 55;
      pointer-events: none;
    }
    .xray-panel.open { pointer-events: auto; }
    .xray-sheet {
      max-width: 720px; margin: 0 auto;
      background: linear-gradient(160deg, #080d1a 0%, #060b16 60%, #040810 100%);
      border: 1px solid rgba(56,189,248,0.12);
      border-bottom: none;
      border-radius: 28px 28px 0 0;
      box-shadow:
        0 -32px 80px rgba(0,0,0,0.9),
        inset 0 1px 0 rgba(56,189,248,0.08);
      overflow: hidden;
      transform: translateY(100%);
      transition: transform 0.42s cubic-bezier(0.22,1,0.36,1);
      max-height: 72vh; display: flex; flex-direction: column;
    }
    .xray-sheet.open { transform: translateY(0); }
    .xray-handle-zone {

      padding: 12px 0 8px; cursor: grab; user-select: none; flex-shrink: 0;
    }
    .xray-handle-bar {

      background: rgba(56,189,248,0.18);

    }

    }

      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, rgba(56,189,248,0.18), rgba(14,165,233,0.1));
      border: 1px solid rgba(56,189,248,0.2);
      box-shadow: 0 0 16px rgba(56,189,248,0.12);
    }
    .xray-badge-label {
      font-size: 9px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(56,189,248,0.5); margin-bottom: 2px;
    }
    .xray-heading {
      font-size: 18px; font-weight: 800; color: #e0f2fe; letter-spacing: -0.01em;
      font-family: 'Playfair Display', serif;
    }
    .xray-close-btn {
      width: 34px; height: 34px; border-radius: 9px; border: 1px solid rgba(56,189,248,0.1);
      background: rgba(255,255,255,0.03); color: rgba(100,150,200,0.5);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; outline: none; transition: all 0.2s;
    }
    .xray-close-btn:hover { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); color: #fca5a5; }
    .xray-scroll { flex: 1; overflow-y: auto; padding: 16px 20px 24px; }
    .xray-scroll::-webkit-scrollbar { width: 3px; }
    .xray-scroll::-webkit-scrollbar-thumb { background: rgba(56,189,248,0.15); border-radius: 99px; }
    .xray-loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 0; gap: 14px;
    }
    .xray-spinner {
      width: 32px; height: 32px; border: 2px solid rgba(56,189,248,0.15);
      border-top-color: rgba(56,189,248,0.8); border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .xray-loading-text {
      font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(56,189,248,0.45); animation: pulse 2s ease-in-out infinite;
    }
    .xray-section-title {
      font-size: 9px; font-weight: 900; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(56,189,248,0.4); margin-bottom: 10px; margin-top: 18px;
    }
    .xray-section-title:first-child { margin-top: 0; }
    .xray-card {
      background: rgba(255,255,255,0.025); border: 1px solid rgba(56,189,248,0.08);
      border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;

    .xray-card:hover { background: rgba(56,189,248,0.06); border-color: rgba(56,189,248,0.18); }

    .xray-entity-icon {

      display: flex; align-items: center; justify-content: center;

    }
    .xray-entity-icon.person { background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.2); }
    .xray-entity-icon.place { background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.2); }
    .xray-entity-icon.concept { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.2); }
    .xray-entity-icon.org { background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.2); }
    .xray-entity-icon.term { background: rgba(56,189,248,0.15); border: 1px solid rgba(56,189,248,0.2); }
    .xray-entity-icon.other { background: rgba(148,163,184,0.1); border: 1px solid rgba(148,163,184,0.15); }

      line-height: 1.3;
    }
    .xray-entity-type-pill {
      display: inline-flex; align-items: center; gap: 4px;

      padding: 2px 7px; border-radius: 99px; margin-top: 3px;

    .xray-entity-type-pill.place { background: rgba(52,211,153,0.12); color: rgba(52,211,153,0.8); border: 1px solid rgba(52,211,153,0.15); }
    .xray-entity-type-pill.concept { background: rgba(251,191,36,0.12); color: rgba(251,191,36,0.8); border: 1px solid rgba(251,191,36,0.15); }
    .xray-entity-type-pill.org { background: rgba(248,113,113,0.12); color: rgba(248,113,113,0.8); border: 1px solid rgba(248,113,113,0.15); }
    .xray-entity-type-pill.term { background: rgba(56,189,248,0.12); color: rgba(56,189,248,0.8); border: 1px solid rgba(56,189,248,0.15); }
    .xray-entity-type-pill.other { background: rgba(148,163,184,0.08); color: rgba(148,163,184,0.6); border: 1px solid rgba(148,163,184,0.1); }

    .xray-btn-label { font-size: 7px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.7; }

    .xray-filter-chip {
      padding: 4px 10px; border-radius: 99px; font-size: 9px; font-weight: 800;

    @keyframes slideOutDown { from{transform:translateY(0);opacity:1} to{transform:translateY(100%);opacity:0} }
    .slide-out-down { animation:slideOutDown 0.36s cubic-bezier(0.32,0,0.67,0) forwards; }

    /* ── Timeline Tab ── */
    .max-drawer-tab-btn.tab-timeline.active {
      background: linear-gradient(135deg, rgba(245,158,11,0.18) 0%, rgba(217,119,6,0.12) 100%);
      color: #fcd34d;
      box-shadow: 0 2px 16px rgba(245,158,11,0.15), inset 0 1px 0 rgba(245,158,11,0.15), inset 0 0 0 1px rgba(245,158,11,0.12);

    }

    }

      background: rgba(245,158,11,0.12);
      color: #fcd34d;
    }
    .tl-generate-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 16px; border-radius: 10px;
      border: 1px solid rgba(245,158,11,0.22);
      background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(217,119,6,0.07));
      color: #fcd34d;
      font-size: 10px; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: all 0.22s ease; outline: none;
    }

      background: linear-gradient(135deg, rgba(245,158,11,0.22), rgba(217,119,6,0.14));
      box-shadow: 0 0 20px rgba(245,158,11,0.18);
      transform: translateY(-1px);

    @keyframes tlReveal { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

      background: linear-gradient(to bottom, rgba(245,158,11,0.4), rgba(245,158,11,0.08));
      border-radius: 99px;
    }

      display: flex; gap: 14px; align-items: flex-start;
      margin-bottom: 20px; position: relative;

    /* ── Dock Corner Glow (Uiverse by Lakshay-art, adapted) ── */
    /* ── Dock Poda Glow Border (Uiverse by Lakshay-art, adapted for pill dock) ── */
    .dock-glow-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* All the layered glow divs sit absolutely behind the glass-dock */
    .dock-poda-layer {
      height: 100%;
      width: 100%;
      position: absolute;
      overflow: hidden;
      z-index: 0;
      border-radius: 60px;
      pointer-events: none;
    }
    /* glow — large blurry outer halo */
    .dock-poda-glow {
      filter: blur(22px);
      opacity: 0;
      max-height: 220px;
      max-width: calc(100% + 80px);
      border-radius: 60px;
      transition: opacity 0.4s ease;
    }
    .dock-poda-glow::before {
      content: "";
      z-index: -2;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(60deg);
      position: absolute;
      width: 999px; height: 999px;
      background-image: conic-gradient(#000, #5533ee 5%, #000 38%, #000 50%, #e030bb 60%, #000 87%);
      transition: all 2s;
    }
    /* darkBorderBg */
    .dock-poda-dark {
      max-height: calc(100% + 16px);
      max-width: calc(100% + 16px);
      filter: blur(3px);
    }
    .dock-poda-dark::before {
      content: "";
      z-index: -2;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(82deg);
      position: absolute;
      width: 800px; height: 800px;
      background-image: conic-gradient(rgba(0,0,0,0), #2a1a88, rgba(0,0,0,0) 10%, rgba(0,0,0,0) 50%, #8e2278, rgba(0,0,0,0) 60%);
      transition: all 2s;
    }
    /* white sheen */
    .dock-poda-white {
      max-height: calc(100% + 4px);
      max-width: calc(100% + 4px);
      filter: blur(2px);
    }
    .dock-poda-white::before {
      content: "";
      z-index: -2;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(83deg);
      position: absolute;
      width: 800px; height: 800px;
      filter: brightness(1.6);
      background-image: conic-gradient(rgba(0,0,0,0) 0%, #b8aef0, rgba(0,0,0,0) 8%, rgba(0,0,0,0) 50%, #f0aaec, rgba(0,0,0,0) 58%);
      transition: all 2s;
    }
    /* sharp border */
    .dock-poda-border {
      max-height: 100%;
      max-width: 100%;
      filter: blur(0.5px);
    }
    .dock-poda-border::before {
      content: "";
      z-index: -2;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(70deg);
      position: absolute;
      width: 800px; height: 800px;
      filter: brightness(1.5);
      background-image: conic-gradient(#1c191c, #5533ee 5%, #1c191c 14%, #1c191c 50%, #e030bb 60%, #1c191c 64%);
      transition: all 2s;
    }
    /* glass-dock sits on top */
    .dock-glow-wrap > .glass-dock {
      position: relative;
      z-index: 1;
    }

    /* === IDLE: visible glow always === */
    .dock-poda-glow { opacity: 0.5; }

    /* === ACTIVE: rotate all layers (triggered by JS class) === */
    .dock-glow-wrap.dg-active .dock-poda-dark::before {
      transform: translate(-50%, -50%) rotate(262deg);
      transition: all 2s;
    }
    .dock-glow-wrap.dg-active .dock-poda-glow::before {
      transform: translate(-50%, -50%) rotate(240deg);
      transition: all 2s;
    }
    .dock-glow-wrap.dg-active .dock-poda-white::before {
      transform: translate(-50%, -50%) rotate(263deg);
      transition: all 2s;
    }
    .dock-glow-wrap.dg-active .dock-poda-border::before {
      transform: translate(-50%, -50%) rotate(250deg);
      transition: all 2s;
    }
    .dock-glow-wrap.dg-active .dock-poda-glow {
      opacity: 0.85;
      transition: opacity 0.3s ease;
    }
    /* Reset when not active */
    .dock-glow-wrap:not(.dg-active) .dock-poda-dark::before   { transform: translate(-50%, -50%) rotate(82deg);  transition: all 1.5s; }
    .dock-glow-wrap:not(.dg-active) .dock-poda-glow::before   { transform: translate(-50%, -50%) rotate(60deg);  transition: all 1.5s; }
    .dock-glow-wrap:not(.dg-active) .dock-poda-white::before  { transform: translate(-50%, -50%) rotate(83deg);  transition: all 1.5s; }
    .dock-glow-wrap:not(.dg-active) .dock-poda-border::before { transform: translate(-50%, -50%) rotate(70deg);  transition: all 1.5s; }
    .dock-glow-wrap:not(.dg-active) .dock-poda-glow           { opacity: 0.5; transition: opacity 1s ease; }

    /* ── LENS Scanning Overlay Animation ── */
    .lens-scan-overlay {
      position: fixed; inset: 0; z-index: 999;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .lens-loader {
      --fill-color: #7c3aed;
      --shine-color: #7c3aed44;
      width: 72px; height: 72px;
      position: relative;
      filter: drop-shadow(0 0 14px var(--shine-color));
      animation: lensOverlayIn 0.3s ease-out both;
    }
    @keyframes lensOverlayIn { from{opacity:0;transform:scale(0.6)} to{opacity:1;transform:scale(1)} }
    .lens-loader svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .lens-loader svg g path:first-child { fill: var(--fill-color); }
    .lens-loader #lp1 { animation: flowe-one 1s linear infinite; }
    .lens-loader #lp2 { opacity: 0; transform: scale(0) translateY(-200px) translateX(-100px); animation: flowe-two 1s linear infinite; animation-delay: 0.3s; }
    .lens-loader #lp3 { opacity: 0; transform: scale(0) translateY(-200px) translateX(100px); animation: flowe-three 1s linear infinite; animation-delay: 0.6s; }
    @keyframes flowe-one {
      0%   { transform: scale(0.5) translateY(-200px); opacity: 0; }
      25%  { transform: scale(0.75) translateY(-100px); opacity: 1; }
      50%  { transform: scale(1) translateY(0px); opacity: 1; }
      75%  { transform: scale(0.5) translateY(50px); opacity: 1; }
      100% { transform: scale(0) translateY(100px); opacity: 0; }
    }
    @keyframes flowe-two {
      0%   { transform: scale(0.5) rotateZ(-10deg) translateY(-200px) translateX(-100px); opacity: 0; }
      25%  { transform: scale(1) rotateZ(-5deg) translateY(-100px) translateX(-50px); opacity: 1; }
      50%  { transform: scale(1) rotateZ(0deg) translateY(0px) translateX(-25px); opacity: 1; }
      75%  { transform: scale(0.5) rotateZ(5deg) translateY(50px) translateX(0px); opacity: 1; }
      100% { transform: scale(0) rotateZ(10deg) translateY(100px) translateX(25px); opacity: 0; }
    }
    @keyframes flowe-three {
      0%   { transform: scale(0.5) rotateZ(10deg) translateY(-200px) translateX(100px); opacity: 0; }
      25%  { transform: scale(1) rotateZ(5deg) translateY(-100px) translateX(50px); opacity: 1; }
      50%  { transform: scale(1) rotateZ(0deg) translateY(0px) translateX(25px); opacity: 1; }
      75%  { transform: scale(0.5) rotateZ(-5deg) translateY(50px) translateX(0px); opacity: 1; }
      100% { transform: scale(0) rotateZ(-10deg) translateY(100px) translateX(-25px); opacity: 0; }

    .partial-rewrite-skeleton {
      display: flex; flex-direction: column; gap: 8px;
      padding: 4px 0; position: relative; overflow: hidden;
    }
    .partial-rewrite-skeleton::before {
      content: '';
      position: absolute; inset: -4px -8px;
      background: linear-gradient(135deg, rgba(99,102,241,0.04), rgba(16,185,129,0.04));

      animation: partialShimmer 1.4s ease-in-out infinite;

      100%{ background-position: -200% 0; }

      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer; outline: none;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: #fff;
      box-shadow: 0 3px 10px rgba(99,102,241,0.35);
      transition: all 0.2s cubic-bezier(0.34,1.2,0.64,1);
      flex-shrink: 0;
    }
    .analysis-chat-send:hover:not(.disabled) {
      transform: scale(1.1) translateY(-1px);
      box-shadow: 0 5px 18px rgba(99,102,241,0.5);
    }
    .analysis-chat-send.disabled {
      background: rgba(255,255,255,0.07);
      box-shadow: none; cursor: not-allowed;
      color: rgba(130,150,200,0.3);
    }

    /* ── Preloaded Question Chips ── */
    .preloaded-questions-wrap {
      padding: 10px 12px 4px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .preloaded-qs-label {
      font-size: 9px; font-weight: 900; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(165,180,252,0.45);
      padding: 0 2px 2px;
    }
    .preloaded-qs-list {
      display: flex; flex-direction: column; gap: 5px;
    }
    .pq-chip {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 8px 12px;
      background: rgba(99,102,241,0.06);
      border: 1px solid rgba(99,102,241,0.14);
      border-radius: 12px;
      cursor: pointer; outline: none;
      text-align: left; width: 100%;
      transition: all 0.18s ease;
      animation: pqFadeIn 0.4s ease both;
    }
    .pq-chip:nth-child(1) { animation-delay: 0.05s; }
    .pq-chip:nth-child(2) { animation-delay: 0.12s; }
    .pq-chip:nth-child(3) { animation-delay: 0.19s; }
    @keyframes pqFadeIn {
      from { opacity:0; transform:translateY(5px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .pq-chip:hover { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.28); }
    .pq-chip:active { background: rgba(99,102,241,0.18); }
    .pq-chip.answered { background: rgba(30,30,50,0.6); border-color: rgba(99,102,241,0.08); cursor: default; }
    .pq-chip.loading  { background: rgba(99,102,241,0.08); border-color: rgba(99,102,241,0.18); cursor: default; }
    .pq-num {
      width: 16px; height: 16px; border-radius: 5px; flex-shrink: 0; margin-top: 1px;
      background: rgba(99,102,241,0.22); color: #a5b4fc;
      font-size: 9px; font-weight: 900; display: flex; align-items: center; justify-content: center;
    }
    .pq-content { flex: 1; min-width: 0; }
    .pq-question {
      font-size: 12px; font-weight: 600; color: rgba(200,210,240,0.85); line-height: 1.4;
    }
    .pq-chip.answered .pq-question,
    .pq-chip.loading  .pq-question { color: rgba(165,180,252,0.6); font-size: 11px; }
    .pq-answer {
      margin-top: 7px;
      font-size: 12px; color: #94a3b8; line-height: 1.55;
      border-top: 1px solid rgba(99,102,241,0.09);
      padding-top: 7px;
    }
    /* Skeleton shimmer */
    .pq-skeleton {
      margin-top: 7px; border-top: 1px solid rgba(99,102,241,0.09); padding-top: 8px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .pq-sk-line {
      height: 10px; border-radius: 6px;
      background: linear-gradient(90deg, rgba(99,102,241,0.08) 25%, rgba(165,180,252,0.14) 50%, rgba(99,102,241,0.08) 75%);
      background-size: 200% 100%;
      animation: skShimmer 1.4s ease infinite;
    }
    @keyframes skShimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    /* Generating chips skeleton (before questions load) */
    .pq-generating {
      display: flex; flex-direction: column; gap: 6px; padding: 4px 2px;
    }
    .pq-gen-line {
      height: 32px; border-radius: 12px;
      background: linear-gradient(90deg, rgba(99,102,241,0.05) 25%, rgba(99,102,241,0.11) 50%, rgba(99,102,241,0.05) 75%);
      background-size: 200% 100%;
      animation: skShimmer 1.6s ease infinite;
    }
    .pq-gen-line:nth-child(2) { animation-delay: 0.2s; width: 90%; }
    .pq-gen-line:nth-child(3) { animation-delay: 0.4s; width: 80%; }

    /* ── Context / Usage Insight Cards ── */
    .ctx-cards { display: flex; flex-direction: column; gap: 10px; }
    .ctx-card {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 13px 14px;
      border-radius: 16px;
      border: 1px solid transparent;
      animation: ctxCardIn 0.38s cubic-bezier(0.22,1,0.36,1) both;
    }
    .ctx-card:nth-child(1) { animation-delay: 0.04s; background: rgba(99,102,241,0.07); border-color: rgba(99,102,241,0.15); }
    .ctx-card:nth-child(2) { animation-delay: 0.10s; background: rgba(16,185,129,0.07); border-color: rgba(16,185,129,0.15); }
    .ctx-card:nth-child(3) { animation-delay: 0.16s; background: rgba(245,158,11,0.07); border-color: rgba(245,158,11,0.15); }
    .ctx-card:nth-child(n+4) { animation-delay: 0.22s; background: rgba(139,92,246,0.07); border-color: rgba(139,92,246,0.15); }
    @keyframes ctxCardIn {
      from { opacity:0; transform:translateX(-8px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .ctx-num {
      width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900;
    }
    .ctx-card:nth-child(1) .ctx-num { background: rgba(99,102,241,0.2); color: #a5b4fc; }
    .ctx-card:nth-child(2) .ctx-num { background: rgba(16,185,129,0.2); color: #6ee7b7; }
    .ctx-card:nth-child(3) .ctx-num { background: rgba(245,158,11,0.2); color: #fcd34d; }
    .ctx-card:nth-child(n+4) .ctx-num { background: rgba(139,92,246,0.2); color: #c4b5fd; }
    .ctx-text {
      flex: 1; font-size: 13px; line-height: 1.65;
      color: rgba(203,213,225,0.9);
      font-family: 'Merriweather', 'Noto Serif Bengali', serif;
    }
    .ctx-text-bold { font-weight: 800; color: #fff; }

    /* ── Entity Image Panel ── */
    .entity-img-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: rgba(10,10,16,0.98);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .entity-img-badge {
      display: inline-flex; align-items: center; gap: 5px;

      font-size: 9px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
      flex-shrink: 0;
    }
    .entity-img-badge.person {
      background: rgba(99,102,241,0.15); color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.25);
    }
    .entity-img-badge.place {
      background: rgba(16,185,129,0.15); color: #6ee7b7;
      border: 1px solid rgba(16,185,129,0.25);
    }
    .entity-img-badge.other {
      background: rgba(100,116,139,0.15); color: #94a3b8;
      border: 1px solid rgba(100,116,139,0.2);
    }
    .entity-img-sources {
      display: flex; gap: 4px; flex: 1;
    }
    .entity-img-src-btn {
      padding: 5px 12px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
      background: rgba(255,255,255,0.04);
      color: rgba(140,160,200,0.55);

    }
    .entity-img-src-btn:hover { background: rgba(255,255,255,0.08); color: rgba(200,220,255,0.85); }
    .entity-img-src-btn.active {
      background: rgba(99,102,241,0.2); color: #a5b4fc;

    .entity-img-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .entity-img-action-btn {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      color: rgba(140,160,200,0.6); cursor: pointer; text-decoration: none;
      transition: all 0.18s ease; outline: none;
    }
    .entity-img-action-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .entity-img-hint {
      padding: 7px 14px;
      font-size: 11px; color: rgba(120,140,180,0.55);
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      flex-shrink: 0;
    }
    .entity-img-hint-name {
      font-weight: 700; color: rgba(165,180,252,0.8);

    /* ── Smart Instant Action Button ── */
    .smart-action-bar {
      display: flex; align-items: stretch; gap: 0;
      border-radius: 18px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      animation: smartActionIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes smartActionIn {
      from { opacity:0; transform:translateY(8px) scale(0.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    .smart-action-primary {
      flex: 1; display: flex; align-items: center; gap: 12px;
      padding: 14px 18px;
      background: linear-gradient(135deg, var(--sa-c1), var(--sa-c2));
      color: #fff; font-size: 13px; font-weight: 700;
      cursor: pointer; text-decoration: none;
      border: none; outline: none;
      transition: filter 0.18s ease;
    }
    .smart-action-primary:hover { filter: brightness(1.12); }
    .smart-action-primary:active { filter: brightness(0.92); }
    .smart-action-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 18px;
    }
    .smart-action-text { display: flex; flex-direction: column; gap: 2px; text-align: left; }
    .smart-action-label { font-size: 11px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.75; }
    .smart-action-name { font-size: 15px; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
    .smart-action-arrow {
      width: 44px; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.2); flex-shrink: 0;
      color: rgba(255,255,255,0.7); font-size: 18px;
    }

    @keyframes slideInTop { from{transform:translateY(-0.5rem);opacity:0} to{transform:translateY(0);opacity:1} }
    .slide-in-from-top-2 { animation:slideInTop 0.3s ease-out; }
    @keyframes slideInFromBottom2 { from{transform:translateY(0.5rem);opacity:0} to{transform:translateY(0);opacity:1} }
    .slide-in-from-bottom-2 { animation:slideInFromBottom2 0.3s ease-out; }
    .duration-300 { transition-duration:300ms; }
    .duration-500 { transition-duration:500ms; }
    .duration-700 { transition-duration:700ms; }
    .fade-in { animation:fadeIn 0.5s ease-out; }

    /* Model selector pill button container */
    .model-pill-container {
      display: flex;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 6px;
      gap: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }
    .model-pill-btn {
      outline: 0 !important;
      border: 0 !important;
      flex: 1;
      height: 44px;
      border-radius: 12px;
      background-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: rgba(255,255,255,0.4);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      cursor: pointer;
      white-space: nowrap;
      padding: 0 10px;
      position: relative;
    }
    .model-pill-btn:hover {
      color: rgba(255,255,255,0.75);
      transform: translateY(-2px);
      background: rgba(255,255,255,0.06);
    }
    .model-pill-btn.active {
      color: #fff;
      background: rgba(255,255,255,0.12);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1) inset;
      transform: translateY(-1px);
    }
    .model-pill-btn.active-indigo {
      background: rgba(99,102,241,0.25);
      color: #a5b4fc;
      box-shadow: 0 2px 16px rgba(99,102,241,0.25), 0 0 0 1px rgba(99,102,241,0.3) inset;
    }
    .model-pill-btn.active-fuchsia {
      background: rgba(217,70,239,0.25);
      color: #f0abfc;
      box-shadow: 0 2px 16px rgba(217,70,239,0.25), 0 0 0 1px rgba(217,70,239,0.3) inset;
    }
    .model-pill-btn.active-emerald {
      background: rgba(16,185,129,0.25);
      color: #6ee7b7;
      box-shadow: 0 2px 16px rgba(16,185,129,0.2), 0 0 0 1px rgba(16,185,129,0.3) inset;
    }
    .model-pill-btn.active-blue {
      background: rgba(59,130,246,0.25);
      color: #93c5fd;
      box-shadow: 0 2px 16px rgba(59,130,246,0.2), 0 0 0 1px rgba(59,130,246,0.3) inset;
    }
    .model-pill-btn .pill-icon {
      font-size: 15px;
      flex-shrink: 0;
      line-height: 1;
    }
    .model-pill-btn .pill-label { line-height: 1; }
    .model-pill-container.scanning {
      background: linear-gradient(135deg, #0f0f1a 0%, #1a0a2e 50%, #2d1b4e 100%);
    }
    .model-pill-container.structure {
      background: linear-gradient(135deg, #1a1200 0%, #2d2000 50%, #3d2a00 100%);

    .model-pill-btn.active-amber {
      background: rgba(245,158,11,0.22);
      color: #fcd34d;
      box-shadow: 0 2px 16px rgba(245,158,11,0.2), 0 0 0 1px rgba(245,158,11,0.3) inset;

    .tab-pill-container {
      display: flex;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 999px;
      padding: 5px;
      gap: 2px;
      box-shadow: rgba(0,0,0,0.4) 0px 4px 20px, rgba(255,255,255,0.03) 0px 0px 0px 1px inset;
    }
    .tab-pill-btn {
      outline: 0 !important;
      border: 0 !important;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.35);

      cursor: pointer;

    .tab-pill-btn.tab-active {
      background: rgba(255,255,255,0.12);

      box-shadow: 0 2px 12px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1) inset;
      transform: translateY(-1px);
    }
    .tab-pill-btn .tab-tooltip {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 7px;

    @keyframes bgLoaderSpin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }

    /* ── Upload Burst Animation ── */
    @keyframes uploadPulse {
      0%   { transform: scale(0.85); opacity: 0; }
      30%  { transform: scale(1.08); opacity: 1; }
      70%  { transform: scale(1.04); opacity: 1; }
      100% { transform: scale(1.0);  opacity: 0.9; }
    }
    @keyframes uploadRing {
      0%   { transform: scale(0.6); opacity: 0.8; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    @keyframes uploadFloat {
      0%   { transform: translateY(0px) scale(1);   opacity: 1; }
      100% { transform: translateY(-60px) scale(0.4); opacity: 0; }
    }
    .upload-overlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
      animation: fadeIn 0.15s ease-out;
    }
    .upload-burst {
      position: relative; display: flex; align-items: center; justify-content: center;
      width: 140px; height: 140px;
    }
    .upload-burst .burst-icon {
      width: 72px; height: 72px;
      background: #080808;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow:
        inset 0 0.3rem 0.9rem rgba(255,255,255,0.3),
        inset 0 -0.4rem 0.9rem rgba(255,255,255,0.5),
        0 0 40px rgba(255,255,255,0.15);
      animation: uploadPulse 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
      z-index: 2;
    }
    .upload-burst .burst-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      animation: uploadRing 0.9s ease-out forwards;
    }
    .upload-burst .burst-ring:nth-child(3) { animation-delay: 0.15s; border-color: rgba(255,255,255,0.2); }
    .upload-burst .burst-ring:nth-child(4) { animation-delay: 0.3s;  border-color: rgba(255,255,255,0.1); }
    .upload-burst .sparkle {
      position: absolute; font-size: 18px;
      animation: uploadFloat 0.9s ease-out forwards;
    }
    .upload-burst .sparkle:nth-child(5) { top: 10px; left: 50%; animation-delay: 0.05s; }
    .upload-burst .sparkle:nth-child(6) { top: 30px; left: 15%; animation-delay: 0.15s; font-size: 12px; }
    .upload-burst .sparkle:nth-child(7) { top: 30px; right: 15%; animation-delay: 0.25s; font-size: 14px; }
    .upload-label {
      margin-top: 24px;
      font-size: 10px; font-weight: 800; letter-spacing: 0.25em;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
      animation: fadeIn 0.3s ease-out 0.2s both;
    }

    /* ── Pearl Button (Uiverse by marcelodolza) ── */
    .pearl-button {
      --white: #ffe7ff;
      --bg: #080808;
      --radius: 100px;
      outline: none;
      cursor: pointer;
      border: 0;
      position: relative;
      border-radius: var(--radius);
      background-color: var(--bg);
      transition: all 0.2s ease;
      box-shadow:
        inset 0 0.3rem 0.9rem rgba(255,255,255,0.3),
        inset 0 -0.1rem 0.3rem rgba(0,0,0,0.7),
        inset 0 -0.4rem 0.9rem rgba(255,255,255,0.5),
        0 3rem 3rem rgba(0,0,0,0.3),
        0 1rem 1rem -0.6rem rgba(0,0,0,0.8);
    }
    .pearl-button .pearl-wrap {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      padding: 14px 28px;
      border-radius: inherit;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
    }
    .pearl-button .pearl-wrap p {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      transition: all 0.2s ease;
      transform: translateY(2%);
      mask-image: linear-gradient(to bottom, white 40%, transparent);
    }
    .pearl-button .pearl-wrap p span:nth-child(2) { display: none; }
    .pearl-button:hover .pearl-wrap p span:nth-child(1) { display: none; }
    .pearl-button:hover .pearl-wrap p span:nth-child(2) { display: inline-block; }
    .pearl-button .pearl-wrap::before,
    .pearl-button .pearl-wrap::after {
      content: "";
      position: absolute;
      transition: all 0.3s ease;
    }
    .pearl-button .pearl-wrap::before {
      left: -15%; right: -15%; bottom: 25%; top: -100%;
      border-radius: 50%;
      background-color: rgba(255,255,255,0.12);
    }
    .pearl-button .pearl-wrap::after {
      left: 6%; right: 6%; top: 12%; bottom: 40%;
      border-radius: 22px 22px 0 0;
      box-shadow: inset 0 10px 8px -10px rgba(255,255,255,0.8);
      background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0) 100%);
    }
    .pearl-button:hover {
      box-shadow:
        inset 0 0.3rem 0.5rem rgba(255,255,255,0.4),
        inset 0 -0.1rem 0.3rem rgba(0,0,0,0.7),
        inset 0 -0.4rem 0.9rem rgba(255,255,255,0.7),
        0 3rem 3rem rgba(0,0,0,0.3),
        0 1rem 1rem -0.6rem rgba(0,0,0,0.8);
    }
    .pearl-button:hover .pearl-wrap::before { transform: translateY(-5%); }
    .pearl-button:hover .pearl-wrap::after  { opacity: 0.4; transform: translateY(5%); }
    .pearl-button:hover .pearl-wrap p       { transform: translateY(-4%); }
    .pearl-button:active {
      transform: translateY(4px);

        inset 0 0.3rem 0.5rem rgba(255,255,255,0.5),
        inset 0 -0.1rem 0.3rem rgba(0,0,0,0.8),
        inset 0 -0.4rem 0.9rem rgba(255,255,255,0.4),
        0 3rem 3rem rgba(0,0,0,0.3),
        0 1rem 1rem -0.6rem rgba(0,0,0,0.8);

    /* ── OCR Skeleton Loader (Uiverse by egehan_1415) ── */
    .ocr-upload {
      width: 340px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      box-shadow: 0 28px 80px rgba(0,0,0,0.55);
      overflow: hidden;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .ocr-up-head {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      align-items: center;
    }
    .ocr-icon {
      width: 42px; height: 42px; border-radius: 14px;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), rgba(255,255,255,0.05) 45%, rgba(0,0,0,0.22) 100%),
        linear-gradient(135deg, rgba(110,231,255,0.35), rgba(176,140,255,0.25));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .ocr-pill {
      font-size: 11px; padding: 6px 10px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.72);
      white-space: nowrap;
      animation: pulse 2s ease-in-out infinite;
    }
    .ocr-up-mid { padding: 14px; }
    .ocr-sk {
      height: 12px; border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.07);
      margin: 10px 0; overflow: hidden; position: relative;
    }
    .ocr-sk-title { width: 62%; height: 13px; margin: 2px 0 8px; }
    .ocr-sk-sub { width: 44%; height: 11px; margin: 0; opacity: 0.9; }
    .ocr-sk-wide { width: 100%; }
    .ocr-sk-short { width: 62%; }
    .ocr-sk::before {
      content: "";
      position: absolute; inset: -40% -60%;
      background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.1) 22%, rgba(255,255,255,0.2) 30%, transparent 44%);
      transform: translateX(-60%);
      animation: ocr-shimmer 1.15s cubic-bezier(0.2,0.8,0.2,1) infinite;
      mix-blend-mode: screen;
    }
    .ocr-up-bar {
      height: 10px; margin: 2px 14px 14px; border-radius: 999px;
      position: relative; overflow: hidden;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
    }
    .ocr-up-bar .bar {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(110,231,255,0), rgba(110,231,255,0.55), rgba(176,140,255,0.55), rgba(110,231,255,0));
      transform: translateX(-70%);
      animation: ocr-flow 1.05s cubic-bezier(0.2,0.8,0.2,1) infinite;
    }
    .ocr-up-bar .shine {
      position: absolute; inset: -30% -40%;
      background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.12) 22%, rgba(255,255,255,0.28) 28%, transparent 40%);
      transform: translateX(-55%);
      animation: ocr-glint 1.05s cubic-bezier(0.2,0.8,0.2,1) infinite;
      mix-blend-mode: screen;
    }
    .ocr-footer {
      padding: 10px 14px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .ocr-footer-page {
      font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      font-family: 'Playfair Display', serif; font-style: italic;
    }
    .ocr-footer-model {
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(110,231,255,0.55);
      font-family: 'Playfair Display', serif;
    }
    @keyframes ocr-shimmer { to { transform: translateX(60%); } }
    @keyframes ocr-flow {
      0%   { transform: translateX(-75%); opacity: 0.55; }
      50%  { opacity: 1; }
      100% { transform: translateX(75%);  opacity: 0.55; }
    }
    @keyframes ocr-glint {
      0%   { transform: translateX(-60%); opacity: 0; }
      20%  { opacity: 1; }
      100% { transform: translateX(60%);  opacity: 0; }
    }

    /* ── 3D Read Now Button (Uiverse by njesenberger) ── */
    .btn-3d {
      -webkit-appearance: none;
      appearance: none;
      position: relative;
      border-width: 0;
      padding: 0 8px 12px;
      min-width: 9em;
      box-sizing: border-box;
      background: transparent;
      font: inherit;
      cursor: pointer;
    }
    .btn-3d-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      z-index: 0;
      padding: 10px 20px;
      transform: translateY(0);
      text-align: center;
      color: rgba(255,255,255,0.8);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 -1px rgba(0,0,0,.4);
      transition-property: transform;
      transition-duration: .2s;
      -webkit-user-select: none;
      user-select: none;
    }
    .btn-3d:active .btn-3d-top { transform: translateY(6px); }
    .btn-3d-top::after {
      content: '';
      position: absolute;
      z-index: -1;
      border-radius: 12px;
      width: 100%;
      height: 100%;
      box-sizing: content-box;
      background-image: radial-gradient(#1a1a1e, #111114);
      box-shadow:
        inset 0 0.3rem 0.9rem rgba(255,255,255,0.15),
        inset 0 -0.1rem 0.3rem rgba(0,0,0,0.7),
        inset 0 -0.4rem 0.9rem rgba(255,255,255,0.25),
        0 1px 2px 1px rgba(255,255,255,.1);
      transition-property: border-radius, padding, width, transform;
      transition-duration: .2s;
    }
    .btn-3d:active .btn-3d-top::after { border-radius: 14px; padding: 0 2px; }
    .btn-3d-bottom {
      position: absolute;
      z-index: -1;
      bottom: 4px; left: 4px;
      border-radius: 14px / 16px 16px 8px 8px;
      padding-top: 6px;
      width: calc(100% - 8px);
      height: calc(100% - 10px);
      box-sizing: content-box;
      background-color: #060608;
      background-image:
        radial-gradient(4px 8px at 4px calc(100% - 8px), rgba(255,255,255,.15), transparent),
        radial-gradient(4px 8px at calc(100% - 4px) calc(100% - 8px), rgba(255,255,255,.15), transparent),
        radial-gradient(16px at -4px 0, rgba(255,255,255,0.3), transparent),
        radial-gradient(16px at calc(100% + 4px) 0, rgba(255,255,255,0.3), transparent);
      box-shadow: 0px 2px 3px 0px rgba(0,0,0,.6), inset 0 -1px 3px 3px rgba(0,0,0,.5);
      transition-property: border-radius, padding-top;
      transition-duration: .2s;
    }
    .btn-3d:active .btn-3d-bottom { border-radius: 14px 14px 8px 8px / 8px; padding-top: 0; }
    .btn-3d-base {
      position: absolute;
      z-index: -2;
      top: 4px; left: 0;
      border-radius: 16px;
      width: 100%;
      height: calc(100% - 4px);
      background-color: rgba(0,0,0,.2);
      box-shadow: 0 1px 1px 0 rgba(255,255,255,.5), inset 0 2px 2px rgba(0,0,0,.3);
    }

    /* ── Isometric Cube SVG (Uiverse by alexs_8179) ── */
    @keyframes iso-bounce {
      0%, 100% { translate: 0px 36px; }

    @keyframes iso-bounce2 {

    #iso-particles  { animation: iso-particles 4s ease-in-out infinite; }

    /* ── Cyber Tab Switch (Uiverse by pharmacist-sabot) ── */
    .cyber-switch-wrap {
      --primary-glow: #00f0ff;
      --inactive-color: #5c6b7f;
      --bg-dark: #0a0a0f;
      --padding: 5px;
      --item-count: 6;
      --item-width: calc((100% - var(--padding) * 2) / var(--item-count));
      position: relative;
      display: flex;
      align-items: center;
      background: var(--bg-dark);
      border-radius: 16px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), inset 0 -1px 2px rgba(255,255,255,0.04), 0 10px 30px -5px rgba(0,0,0,0.5);
      border: 1px solid #1f222e;
      padding: var(--padding);
      overflow: hidden;
      height: 52px;
      width: 100%;
      max-width: 460px;
    }
    .cyber-switch-wrap input[type="radio"] {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    .cyber-tab-label {
      flex: 1; height: 100%;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 2px;
      cursor: pointer; z-index: 2; position: relative;
      border-radius: 12px;
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .cyber-tab-label .ct-icon {
      font-size: 15px; line-height: 1;
      color: var(--inactive-color);
      transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
    }
    .cyber-tab-label .ct-text {
      font-size: 7.5px; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--inactive-color);
      transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
      line-height: 1;
    }
    .cyber-tab-label .ct-glare {
      position: absolute; inset: 0; border-radius: 12px;
      background: radial-gradient(circle at 50% -20%, rgba(255,255,255,0.1), transparent 60%);
      opacity: 0; transition: opacity 0.3s;
    }
    .cyber-tab-label:hover .ct-glare { opacity: 1; }
    .cyber-tab-label:hover .ct-icon { color: #aeb9cc; }
    .cyber-tab-label:active .ct-icon { transform: scale(0.92); }
    /* active states for each of 6 tabs */
    #cst-1:checked ~ [for="cst-1"] .ct-icon,
    #cst-2:checked ~ [for="cst-2"] .ct-icon,
    #cst-3:checked ~ [for="cst-3"] .ct-icon,
    #cst-4:checked ~ [for="cst-4"] .ct-icon,
    #cst-5:checked ~ [for="cst-5"] .ct-icon,
    #cst-6:checked ~ [for="cst-6"] .ct-icon {
      color: #fff;
      filter: drop-shadow(0 0 7px var(--primary-glow));
      transform: scale(1.15);
    }
    #cst-1:checked ~ [for="cst-1"] .ct-text,
    #cst-2:checked ~ [for="cst-2"] .ct-text,
    #cst-3:checked ~ [for="cst-3"] .ct-text,
    #cst-4:checked ~ [for="cst-4"] .ct-text,
    #cst-5:checked ~ [for="cst-5"] .ct-text,
    #cst-6:checked ~ [for="cst-6"] .ct-text { color: #00f0ff; }
    .cyber-highlight {
      position: absolute;
      top: var(--padding);
      left: var(--padding);
      width: var(--item-width);
      height: calc(52px - var(--padding) * 2);
      z-index: 1; pointer-events: none;
      transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .cyber-highlight-inner {
      width: 100%; height: 100%; border-radius: 12px;
      background: linear-gradient(145deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid rgba(255,255,255,0.13);
      box-shadow: 0 0 18px var(--primary-glow), inset 0 0 12px rgba(0,240,255,0.15);
      position: relative;
      animation: cyber-neon-pulse 3s infinite ease-in-out;
    }
    .cyber-highlight-inner::after {
      content: ""; position: absolute; top: 0; left: 10%; width: 80%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.75), transparent);
      opacity: 0.8;
    }
    #cst-1:checked ~ .cyber-highlight { transform: translateX(0%); }
    #cst-2:checked ~ .cyber-highlight { transform: translateX(100%); }
    #cst-3:checked ~ .cyber-highlight { transform: translateX(200%); }
    #cst-4:checked ~ .cyber-highlight { transform: translateX(300%); }
    #cst-5:checked ~ .cyber-highlight { transform: translateX(400%); }
    #cst-6:checked ~ .cyber-highlight { transform: translateX(500%); }
    @keyframes cyber-neon-pulse {
      0%,100% { box-shadow: 0 0 18px var(--primary-glow), inset 0 0 12px rgba(0,240,255,0.15); }
      50%      { box-shadow: 0 0 26px var(--primary-glow), inset 0 0 20px rgba(0,240,255,0.28); }
    }

    /* ── Settings Neumorphic Drawer (Uiverse by ercnersoy) ── */
    .settings-neomorph {
      background: #1a1a1e;
      border: 1.5px solid rgba(255,255,255,0.07);
      box-shadow:
        inset 6px 6px 18px rgba(0,0,0,0.6),
        inset -6px -6px 18px rgba(255,255,255,0.03),
        0 -12px 48px rgba(0,0,0,0.5);
      transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
      overflow: hidden;
    }
    @keyframes slideOutDown {
      from { transform: translateY(0); opacity: 1; }
      to   { transform: translateY(100%); opacity: 0; }
    }
    .slide-out-down {
      animation: slideOutDown 0.38s cubic-bezier(0.32,0.72,0,1) forwards;
    }

    /* ── Spinning Words Loader (Uiverse by kennyotsu) ── */
    .spin-loader {
      --bg-color: #020202;
      display: flex;
      align-items: center;
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: 2.5rem;
      color: rgba(255,255,255,0.85);
      height: 52px;
      line-height: 52px;
    }
    .spin-loader .static-word {
      white-space: nowrap;
      margin-right: 10px;
    }
    .spin-words {
      overflow: hidden;
      position: relative;
      height: 52px;
    }
    .spin-words::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        var(--bg-color) 10%,
        transparent 30%,
        transparent 70%,
        var(--bg-color) 90%
      );
      z-index: 20;
    }
    .spin-word {
      display: block;
      height: 100%;
      padding-left: 8px;
      color: #a78bfa;
      font-style: italic;
      animation: spin_words 6s infinite;
    }
    @keyframes spin_words {
      8%  { transform: translateY(-102%); }
      16% { transform: translateY(-100%); }
      24% { transform: translateY(-202%); }
      33% { transform: translateY(-200%); }
      41% { transform: translateY(-302%); }
      50% { transform: translateY(-300%); }
      58% { transform: translateY(-402%); }
      66% { transform: translateY(-400%); }
      74% { transform: translateY(-502%); }
      83% { transform: translateY(-500%); }
      91% { transform: translateY(-602%); }
      100%{ transform: translateY(-600%); }
    }

    /* ── Morphing Shape Loader (Uiverse by mobinkakei) ── */
    .shape-loader {
      --path: rgba(255,255,255,0.18);
      --dot: #818cf8;
      --duration: 3s;
      width: 44px;
      height: 44px;
      position: relative;
      display: inline-block;
      margin: 0 16px;
    }
    .shape-loader:before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      position: absolute;
      display: block;
      background: var(--dot);
      top: 37px;
      left: 19px;
      transform: translate(-18px, -18px);
      animation: dotRect var(--duration) cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
    }
    .shape-loader svg { display: block; width: 100%; height: 100%; }
    .shape-loader svg rect,
    .shape-loader svg polygon,
    .shape-loader svg circle {
      fill: none;
      stroke: var(--path);
      stroke-width: 10px;
      stroke-linejoin: round;
      stroke-linecap: round;
    }
    .shape-loader svg polygon {
      stroke-dasharray: 145 76 145 76;
      stroke-dashoffset: 0;
      animation: pathTriangle var(--duration) cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
    }
    .shape-loader svg rect {
      stroke-dasharray: 192 64 192 64;
      stroke-dashoffset: 0;
      animation: pathRect var(--duration) cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
    }
    .shape-loader svg circle {
      stroke-dasharray: 150 50 150 50;
      stroke-dashoffset: 75;
      animation: pathCircle var(--duration) cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
    }
    .shape-loader.triangle { width: 48px; }
    .shape-loader.triangle:before {
      left: 21px;
      transform: translate(-10px, -18px);
      animation: dotTriangle var(--duration) cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
    }
    @keyframes pathTriangle {
      33% { stroke-dashoffset: 74; }
      66% { stroke-dashoffset: 147; }
      100% { stroke-dashoffset: 221; }
    }
    @keyframes dotTriangle {
      33% { transform: translate(0, 0); }
      66% { transform: translate(10px, -18px); }
      100% { transform: translate(-10px, -18px); }
    }
    @keyframes pathRect {
      25% { stroke-dashoffset: 64; }
      50% { stroke-dashoffset: 128; }
      75% { stroke-dashoffset: 192; }
      100% { stroke-dashoffset: 256; }
    }
    @keyframes dotRect {
      25% { transform: translate(0, 0); }
      50% { transform: translate(18px, -18px); }
      75% { transform: translate(0, -36px); }
      100% { transform: translate(-18px, -18px); }
    }
    @keyframes pathCircle {
      25% { stroke-dashoffset: 125; }
      50% { stroke-dashoffset: 175; }
      75% { stroke-dashoffset: 225; }
      100% { stroke-dashoffset: 275; }
    }

    /* ── Shine Card (Uiverse by 05akalan57) ── */
    .shine-card {
      position: relative;
      overflow: visible;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      padding: 1px;
      -webkit-box-reflect: below 8px linear-gradient(to bottom, rgba(0,0,0,0.0), rgba(0,0,0,0.35));
      filter: drop-shadow(0px 0px 8px rgba(120, 100, 255, 0.18));
    }
    .shine-card-inner {
      position: relative;
      border-radius: 19px;
      z-index: 1;
      background: #0d0d10;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .shine-orb {
      position: absolute;
      width: 120%;
      height: 260px;
      background: white;
      filter: blur(70px);

    /* ── Vertical Radio Glider (Uiverse by Smit-Prajapati) ── */
    .radio-container {
      --main-color: #a78bfa;
      --main-color-opacity: #a78bfa1c;
      --total-radio: 4;
      display: flex;
      flex-direction: column;
      position: relative;
      padding-left: 0.75rem;
    }
    .radio-container.scanning-radio { --main-color: #67e8f9; --main-color-opacity: #67e8f91c; --total-radio: 3; }
    .radio-container.structure-radio { --main-color: #fcd34d; --main-color-opacity: #fcd34d1c; --total-radio: 4; }
    .radio-container input { cursor: pointer; appearance: none; }
    .radio-container .glider-container {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(27,27,27,1) 50%, rgba(0,0,0,0) 100%);
      width: 1px;
    }
    .radio-container .glider-container .glider {
      position: relative;
      height: calc(100% / var(--total-radio));
      width: 100%;
      background: linear-gradient(0deg, rgba(0,0,0,0) 0%, var(--main-color) 50%, rgba(0,0,0,0) 100%);
      transition: transform 0.5s cubic-bezier(0.37, 1.95, 0.66, 0.56);
    }
    .radio-container .glider-container .glider::before {
      content: ""; position: absolute; height: 60%; width: 300%;
      top: 50%; transform: translateY(-50%);
      background: var(--main-color); filter: blur(10px);
    }
    .radio-container .glider-container .glider::after {
      content: ""; position: absolute; left: 0; height: 100%; width: 180px;
      background: linear-gradient(90deg, var(--main-color-opacity) 0%, rgba(0,0,0,0) 100%);
    }
    .radio-container label {
      cursor: pointer; padding: 0.85rem 1rem; position: relative;
      color: rgba(148,163,184,0.5);
      transition: all 0.3s ease-in-out;
      display: flex; align-items: center; gap: 10px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      border-radius: 12px;
