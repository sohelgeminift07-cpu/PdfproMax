    /* ── Dock Corner Glow (Uiverse by Lakshay-art, adapted) ── */
    /* ── Dock Poda Glow Border (Uiverse by Lakshay-art, adapted for pill dock) ── */
    .dock-glow-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* All the layered glow divs sit absolutely behind the glass-dock */
    .dock-poda-layer {
      height: 100%;
      width: 100%;
      position: absolute;
      overflow: hidden;
      z-index: 0;
      border-radius: 60px;
      pointer-events: none;
      will-change: transform;
      contain: strict;
    }
    /* glow — large blurry outer halo */
    .dock-poda-glow {
      filter: blur(22px);
      opacity: 0;
      max-height: 220px;
      max-width: calc(100% + 80px);
      border-radius: 60px;
      transition: opacity 0.4s ease;
    }
    .dock-poda-glow::before {
      content: "";
      z-index: -2;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(60deg);
      position: absolute;
      width: 999px; height: 999px;
      background-image: conic-gradient(#000, #5533ee 5%, #000 38%, #000 50%, #e030bb 60%, #000 87%);
      transition: all 2s;
    }
    /* darkBorderBg */
    .dock-poda-dark {
      max-height: calc(100% + 16px);
      max-width: calc(100% + 16px);
      filter: blur(3px);
    }
    .dock-poda-dark::before {
      content: "";
      z-index: -2;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(82deg);
      position: absolute;
      width: 800px; height: 800px;
      background-image: conic-gradient(rgba(0,0,0,0), #2a1a88, rgba(0,0,0,0) 10%, rgba(0,0,0,0) 50%, #8e2278, rgba(0,0,0,0) 60%);
      transition: all 2s;
    }
    /* white sheen */
    .dock-poda-white {
      max-height: calc(100% + 4px);
      max-width: calc(100% + 4px);
      filter: blur(2px);
    }
    .dock-poda-white::before {
      content: "";
      z-index: -2;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(83deg);
      position: absolute;
      width: 800px; height: 800px;
      filter: brightness(1.6);
      background-image: conic-gradient(rgba(0,0,0,0) 0%, #b8aef0, rgba(0,0,0,0) 8%, rgba(0,0,0,0) 50%, #f0aaec, rgba(0,0,0,0) 58%);
      transition: all 2s;
    }
    /* sharp border */
    .dock-poda-border {
      max-height: 100%;
      max-width: 100%;
      filter: blur(0.5px);
    }
    .dock-poda-border::before {
      content: "";
      z-index: -2;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(70deg);
      position: absolute;
      width: 800px; height: 800px;
      filter: brightness(1.5);
      background-image: conic-gradient(#1c191c, #5533ee 5%, #1c191c 14%, #1c191c 50%, #e030bb 60%, #1c191c 64%);
      transition: all 2s;
    }
    /* glass-dock sits on top */
    .dock-glow-wrap > .glass-dock {
      position: relative;
      z-index: 1;
    }

    /* === IDLE: all layers hidden === */
    .dock-poda-glow   { opacity: 0; }
    .dock-poda-dark   { opacity: 0; }
    .dock-poda-white  { opacity: 0; }
    .dock-poda-border { opacity: 0; }

    /* === ACTIVE: show & rotate all layers === */
    .dock-glow-wrap.dg-active .dock-poda-dark   { opacity: 1; transition: opacity 0.3s ease; }
    .dock-glow-wrap.dg-active .dock-poda-white  { opacity: 1; transition: opacity 0.3s ease; }
    .dock-glow-wrap.dg-active .dock-poda-border { opacity: 1; transition: opacity 0.3s ease; }

    /* === ACTIVE: rotate all layers (triggered by JS class) === */
    .dock-glow-wrap.dg-active .dock-poda-dark::before {
      transform: translate(-50%, -50%) rotate(262deg);
      transition: all 2s;
    }
    .dock-glow-wrap.dg-active .dock-poda-glow::before {
      transform: translate(-50%, -50%) rotate(240deg);
      transition: all 2s;
    }
    .dock-glow-wrap.dg-active .dock-poda-white::before {
      transform: translate(-50%, -50%) rotate(263deg);
      transition: all 2s;
    }
    .dock-glow-wrap.dg-active .dock-poda-border::before {
      transform: translate(-50%, -50%) rotate(250deg);
      transition: all 2s;
    }
    .dock-glow-wrap.dg-active .dock-poda-glow {
      opacity: 0.85;
      transition: opacity 0.3s ease;
    }
    /* Reset when not active — hide everything */
    .dock-glow-wrap:not(.dg-active) .dock-poda-dark::before   { transform: translate(-50%, -50%) rotate(82deg);  transition: all 1.5s; }
    .dock-glow-wrap:not(.dg-active) .dock-poda-glow::before   { transform: translate(-50%, -50%) rotate(60deg);  transition: all 1.5s; }
    .dock-glow-wrap:not(.dg-active) .dock-poda-white::before  { transform: translate(-50%, -50%) rotate(83deg);  transition: all 1.5s; }
    .dock-glow-wrap:not(.dg-active) .dock-poda-border::before { transform: translate(-50%, -50%) rotate(70deg);  transition: all 1.5s; }
    .dock-glow-wrap:not(.dg-active) .dock-poda-glow   { opacity: 0; transition: opacity 1s ease; }
    .dock-glow-wrap:not(.dg-active) .dock-poda-dark   { opacity: 0; transition: opacity 1s ease; }
    .dock-glow-wrap:not(.dg-active) .dock-poda-white  { opacity: 0; transition: opacity 1s ease; }
    .dock-glow-wrap:not(.dg-active) .dock-poda-border { opacity: 0; transition: opacity 1s ease; }

    .bino-btn:hover { background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(139,92,246,0.14)); border-color: rgba(167,139,250,0.4); color: #a78bfa; box-shadow: 0 0 18px rgba(167,139,250,0.2); }
    .bino-btn.active { background: linear-gradient(135deg, rgba(167,139,250,0.25), rgba(139,92,246,0.18)); border-color: rgba(167,139,250,0.55); color: #c4b5fd; box-shadow: 0 0 24px rgba(167,139,250,0.3), inset 0 1px 0 rgba(167,139,250,0.2); animation: pulse 2.5s ease-in-out infinite; }
    .bino-btn-label { font-size: 7px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.7; }



    /* LENS Scanning Overlay Animation ── */
    .lens-scan-overlay {
      position: fixed; inset: 0; z-index: 999;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .lens-loader {
      --fill-color: #7c3aed;
      --shine-color: #7c3aed44;
      width: 72px; height: 72px;
      position: relative;
      filter: drop-shadow(0 0 14px var(--shine-color));
      animation: lensOverlayIn 0.3s ease-out both;
    }
    @keyframes lensOverlayIn { from{opacity:0;transform:scale(0.6)} to{opacity:1;transform:scale(1)} }
    .lens-loader svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .lens-loader svg g path:first-child { fill: var(--fill-color); }
    .lens-loader #lp1 { animation: flowe-one 1s linear infinite; }
    .lens-loader #lp2 { opacity: 0; transform: scale(0) translateY(-200px) translateX(-100px); animation: flowe-two 1s linear infinite; animation-delay: 0.3s; }
    .lens-loader #lp3 { opacity: 0; transform: scale(0) translateY(-200px) translateX(100px); animation: flowe-three 1s linear infinite; animation-delay: 0.6s; }
    @keyframes flowe-one {
      0%   { transform: scale(0.5) translateY(-200px); opacity: 0; }
      25%  { transform: scale(0.75) translateY(-100px); opacity: 1; }
      50%  { transform: scale(1) translateY(0px); opacity: 1; }
      75%  { transform: scale(0.5) translateY(50px); opacity: 1; }
      100% { transform: scale(0) translateY(100px); opacity: 0; }
    }
    @keyframes flowe-two {
      0%   { transform: scale(0.5) rotateZ(-10deg) translateY(-200px) translateX(-100px); opacity: 0; }
      25%  { transform: scale(1) rotateZ(-5deg) translateY(-100px) translateX(-50px); opacity: 1; }
      50%  { transform: scale(1) rotateZ(0deg) translateY(0px) translateX(-25px); opacity: 1; }
      75%  { transform: scale(0.5) rotateZ(5deg) translateY(50px) translateX(0px); opacity: 1; }
      100% { transform: scale(0) rotateZ(10deg) translateY(100px) translateX(25px); opacity: 0; }
    }
    @keyframes flowe-three {
      0%   { transform: scale(0.5) rotateZ(10deg) translateY(-200px) translateX(100px); opacity: 0; }
      25%  { transform: scale(1) rotateZ(5deg) translateY(-100px) translateX(50px); opacity: 1; }
      50%  { transform: scale(1) rotateZ(0deg) translateY(0px) translateX(25px); opacity: 1; }
      75%  { transform: scale(0.5) rotateZ(-5deg) translateY(50px) translateX(0px); opacity: 1; }
      100% { transform: scale(0) rotateZ(-10deg) translateY(100px) translateX(-25px); opacity: 0; }
    }


    /* ── Shared Bottom Drawer Shell ── */
    .bottom-drawer-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      transition: opacity 0.28s ease;
      z-index: 0;
    }
    .bottom-drawer-backdrop.closing { opacity: 0; pointer-events: none; }
    .bottom-drawer-shell {
      position: relative;
      width: 100%; max-width: 720px;
      margin: 0 auto;
      display: flex; flex-direction: column;
      font-family: 'Noto Serif Bengali', 'Merriweather', serif;
      background: linear-gradient(160deg, #0f1623 0%, #0d1220 40%, #0a0f1a 100%);
      border: 1px solid rgba(99,130,200,0.12);
      border-radius: 28px 28px 0 0;
      box-shadow:
        inset 0 1px 0 rgba(120,160,255,0.08),
        inset 1px 0 0 rgba(120,160,255,0.04),
        inset -1px 0 0 rgba(120,160,255,0.04),
        0 -24px 80px rgba(0,0,0,0.8),
        0 -2px 0 rgba(100,140,255,0.06);
      overflow: clip;
      touch-action: pan-y;
      transition: transform 0.28s cubic-bezier(0.22,1,0.36,1);
      will-change: transform;
      transform: translateZ(0);
      backface-visibility: hidden;
      contain: layout paint;
    }
    .bottom-drawer-handle {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      padding: 14px 0 10px;
      cursor: grab; user-select: none;

    .bottom-drawer-handle-bar {

      border-radius: 99px;
      transition: width 0.25s ease, background 0.25s ease;

    .max-drawer-header-icon.summary {
      background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(5,150,105,0.08));
      border: 1px solid rgba(16,185,129,0.2);
      color: #6ee7b7;
    }
    .max-drawer-header-icon.chat {
      background: linear-gradient(135deg, rgba(99,102,241,0.18), rgba(79,70,229,0.1));
      border: 1px solid rgba(99,102,241,0.2);
      color: #a5b4fc;
    }

    /* ── Selection Toolbar ── */
    .sel-toolbar {
      position: fixed;
      z-index: 200;
      transform: translate(-50%, -100%);
      display: flex;
      align-items: center;
      gap: 4px;
      background: linear-gradient(135deg, #0f1623 0%, #0d1220 100%);
      border: 1px solid rgba(99,130,200,0.2);
      border-radius: 14px;
      padding: 6px 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(120,160,255,0.08);
      animation: selToolbarIn 0.18s cubic-bezier(0.34,1.4,0.64,1) both;
      pointer-events: all;
    }
    @keyframes selToolbarIn {
      from { opacity: 0; transform: translate(-50%, -90%); }
      to   { opacity: 1; transform: translate(-50%, -100%); }
    }
    .sel-toolbar-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px; border-radius: 9px; border: none; cursor: pointer;
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; outline: none; white-space: nowrap;
      transition: all 0.18s ease;
    }
    .sel-toolbar-btn.analyze {
      background: rgba(99,102,241,0.15);
      color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.2);
    }
    .sel-toolbar-btn.analyze:hover { background: rgba(99,102,241,0.25); }
    .sel-toolbar-btn.rewrite {
      background: rgba(16,185,129,0.15);
      color: #6ee7b7;
      border: 1px solid rgba(16,185,129,0.2);
    }
    .sel-toolbar-btn.rewrite:hover { background: rgba(16,185,129,0.25); }
    .sel-toolbar-divider {
      width: 1px; height: 22px;
      background: rgba(99,130,200,0.15);
      flex-shrink: 0;
    }
    .sel-toolbar-preview {
      max-width: 160px; font-size: 10px; color: rgba(130,160,210,0.55);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      padding: 0 4px;
    }
    /* ── Per-block skeleton for partial rewrite ── */
    .partial-rewrite-skeleton {
      display: flex; flex-direction: column; gap: 8px;
      padding: 4px 0; position: relative; overflow: hidden;
    }
    .partial-rewrite-skeleton::before {
      content: '';
      position: absolute; inset: -4px -8px;
      background: linear-gradient(135deg, rgba(99,102,241,0.04), rgba(16,185,129,0.04));
      border-left: 2px solid rgba(99,102,241,0.3);
      border-radius: 0 8px 8px 0;
      animation: partialPulse 1.5s ease-in-out infinite;
    }
    @keyframes partialPulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
    .partial-sk-line {
      height: 14px; border-radius: 99px;
      background: linear-gradient(90deg, rgba(99,102,241,0.08) 25%, rgba(99,102,241,0.15) 50%, rgba(99,102,241,0.08) 75%);
      background-size: 200% 100%;
      animation: partialShimmer 1.4s ease-in-out infinite;
    }
    @keyframes partialShimmer {
      0%  { background-position: 200% 0; }
      100%{ background-position: -200% 0; }
    }
    /* Customizer selection preview */
    .cust-sel-preview {
      background: rgba(99,102,241,0.07);
      border: 1px solid rgba(99,102,241,0.15);
      border-left: 3px solid rgba(99,102,241,0.5);
      border-radius: 0 10px 10px 0;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 12px; color: rgba(180,200,240,0.7);
      line-height: 1.5; font-style: italic;
      max-height: 80px; overflow: hidden;
      position: relative;
    }
    .cust-sel-preview::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 28px;
      background: linear-gradient(to top, rgba(15,22,35,0.9), transparent);
    }
    .cust-sel-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 9px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
      color: #6ee7b7; background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.2); border-radius: 6px;
      padding: 3px 8px; margin-bottom: 8px;
    }
    /* ── Inline partial skeleton shimmer ── */
    .inline-partial-sk {
        background: linear-gradient(90deg,
            rgba(99,102,241,0.12) 25%,
            rgba(99,102,241,0.28) 50%,
            rgba(99,102,241,0.12) 75%);
        background-size: 200% 100%;
        animation: inlineSkShimmer 1.3s ease-in-out infinite;
        border-radius: 4px;
        display: inline-block;
        vertical-align: middle;
    }
    @keyframes inlineSkShimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }
    /* ── Inline rewritten glow ── */
    mark.rewritten-inline-glow,
    .rewritten-inline-glow {
        background: transparent !important;
        background-color: transparent !important;
        border-bottom: 2px dotted rgba(99,130,220,0.6);
        border-radius: 0;
        padding: 0;
        color: inherit;
        font-style: inherit;
        font-weight: inherit;
    }
    .rewritten-inline-glow * { color: inherit !important; }
    @keyframes rewrittenInlineFade {
        from { border-bottom-color: rgba(99,130,220,0.9); }
        to   { border-bottom-color: rgba(99,130,220,0.6); }
    }
    /* ── Rewritten line highlight (kept for backwards compat) ── */
    .rewritten-line-glow {
        position: relative;
        border-radius: 6px;
        background: rgba(99,102,241,0.08);
        box-shadow: inset 3px 0 0 rgba(99,102,241,0.45);
        padding-left: 8px;
        margin-left: -8px;
        animation: rewrittenFadeIn 0.4s ease both;
        transition: background 1s ease, box-shadow 1s ease;
    }
    @keyframes rewrittenFadeIn {
        from { background: rgba(99,102,241,0.22); box-shadow: inset 3px 0 0 rgba(99,102,241,0.8); }
        to   { background: rgba(99,102,241,0.08); box-shadow: inset 3px 0 0 rgba(99,102,241,0.45); }
    }
        @keyframes zoomIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
    .zoom-in-95 { animation:zoomIn 0.2s ease-out; }
    /* ── Analysis Inline Chat Panel ── */
    .analysis-chat-panel {
      border-radius: 20px;
      border: 1px solid rgba(99,102,241,0.14);
      background: linear-gradient(160deg, rgba(15,18,35,0.97) 0%, rgba(10,14,28,0.99) 100%);
      box-shadow: 0 4px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(120,140,255,0.07);
      overflow: hidden;
    }
    .analysis-chat-header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 12px 16px 10px;
      border-bottom: 1px solid rgba(99,102,241,0.09);
      background: rgba(99,102,241,0.04);
    }
    .analysis-chat-header-icon {
      width: 26px; height: 26px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(79,70,229,0.12));
      border: 1px solid rgba(99,102,241,0.22);
      color: #a5b4fc;
      flex-shrink: 0;
    }
    .analysis-chat-header-label {
      flex: 1;
      font-size: 10px; font-weight: 800;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(165,180,252,0.7);
    }
    .analysis-chat-thinking {
      display: flex; gap: 4px; align-items: center;
    }
    .analysis-chat-thinking-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(165,180,252,0.6);
      animation: maxDrawerBounce 1.1s ease-in-out infinite;
    }
    .analysis-chat-thinking-dot:nth-child(2) { animation-delay: 0.16s; }
    .analysis-chat-thinking-dot:nth-child(3) { animation-delay: 0.32s; }
    .analysis-chat-messages {
      padding: 14px 16px 8px;
      display: flex; flex-direction: column; gap: 10px;
      max-height: 260px;
      overflow-y: auto;
    }
    .analysis-chat-messages::-webkit-scrollbar { width: 3px; }
    .analysis-chat-messages::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.2); border-radius: 99px; }
    .analysis-chat-msg-row { display: flex; }
    .analysis-chat-msg-row.user { justify-content: flex-end; }
    .analysis-chat-msg-row.ai  { justify-content: flex-start; }
    .analysis-chat-bubble {
      max-width: 85%;
      font-size: 13px; line-height: 1.55;
      border-radius: 14px;
      padding: 9px 14px;
    }
    .analysis-chat-bubble.user {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: #fff;
      border-radius: 14px 14px 3px 14px;
      box-shadow: 0 3px 12px rgba(99,102,241,0.3);
      font-weight: 500;
    }
    .analysis-chat-bubble.ai {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(99,130,200,0.12);
      color: #cbd5e1;
      border-radius: 14px 14px 14px 3px;
    }
    .analysis-chat-hint {
      padding: 12px 16px 4px;
      font-size: 11px;
      color: rgba(100,120,170,0.45);
      font-style: italic;
    }
    .analysis-chat-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px 12px;
    }
    .analysis-chat-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(99,102,241,0.18);
      border-radius: 12px;
      padding: 9px 14px;
      color: #e2e8f0;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .analysis-chat-input:focus {
      border-color: rgba(99,102,241,0.4);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.08);
    }
    .analysis-chat-input::placeholder { color: rgba(100,120,170,0.4); }
    .analysis-chat-input:disabled { opacity: 0.5; }
    .analysis-chat-send {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer; outline: none;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: #fff;
      box-shadow: 0 3px 10px rgba(99,102,241,0.35);
      transition: all 0.2s cubic-bezier(0.34,1.2,0.64,1);
      flex-shrink: 0;
    }
    .analysis-chat-send:hover:not(.disabled) {
      transform: scale(1.1) translateY(-1px);
      box-shadow: 0 5px 18px rgba(99,102,241,0.5);
    }
    .analysis-chat-send.disabled {
      background: rgba(255,255,255,0.07);
      box-shadow: none; cursor: not-allowed;
      color: rgba(130,150,200,0.3);
    }

    /* ── Preloaded Question Chips ── */
    .preloaded-questions-wrap {
      padding: 10px 12px 4px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .preloaded-qs-label {
      font-size: 9px; font-weight: 900; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(165,180,252,0.45);
      padding: 0 2px 2px;
    }
    .preloaded-qs-list {
      display: flex; flex-direction: column; gap: 5px;
    }
    .pq-chip {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 8px 12px;
      background: rgba(99,102,241,0.06);
      border: 1px solid rgba(99,102,241,0.14);
      border-radius: 12px;
      cursor: pointer; outline: none;
      text-align: left; width: 100%;
      transition: all 0.18s ease;
      animation: pqFadeIn 0.4s ease both;
    }
    .pq-chip:nth-child(1) { animation-delay: 0.05s; }
    .pq-chip:nth-child(2) { animation-delay: 0.12s; }
    .pq-chip:nth-child(3) { animation-delay: 0.19s; }
    @keyframes pqFadeIn {
      from { opacity:0; transform:translateY(5px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .pq-chip:hover { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.28); }
    .pq-chip:active { background: rgba(99,102,241,0.18); }
    .pq-chip.answered { background: rgba(30,30,50,0.6); border-color: rgba(99,102,241,0.08); cursor: default; }
    .pq-chip.loading  { background: rgba(99,102,241,0.08); border-color: rgba(99,102,241,0.18); cursor: default; }
    .pq-num {
      width: 16px; height: 16px; border-radius: 5px; flex-shrink: 0; margin-top: 1px;
      background: rgba(99,102,241,0.22); color: #a5b4fc;
      font-size: 9px; font-weight: 900; display: flex; align-items: center; justify-content: center;
    }
    .pq-content { flex: 1; min-width: 0; }
    .pq-question {
      font-size: 12px; font-weight: 600; color: rgba(200,210,240,0.85); line-height: 1.4;
    }
    .pq-chip.answered .pq-question,
    .pq-chip.loading  .pq-question { color: rgba(165,180,252,0.6); font-size: 11px; }
    .pq-answer {
      margin-top: 7px;
      font-size: 12px; color: #94a3b8; line-height: 1.55;
      border-top: 1px solid rgba(99,102,241,0.09);
      padding-top: 7px;
    }
    /* Skeleton shimmer */
    .pq-skeleton {
      margin-top: 7px; border-top: 1px solid rgba(99,102,241,0.09); padding-top: 8px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .pq-sk-line {
      height: 10px; border-radius: 6px;
      background: linear-gradient(90deg, rgba(99,102,241,0.08) 25%, rgba(165,180,252,0.14) 50%, rgba(99,102,241,0.08) 75%);
      background-size: 200% 100%;
      animation: skShimmer 1.4s ease infinite;
    }
    @keyframes skShimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    /* Generating chips skeleton (before questions load) */
    .pq-generating {
      display: flex; flex-direction: column; gap: 6px; padding: 4px 2px;
    }
    .pq-gen-line {
      height: 32px; border-radius: 12px;
      background: linear-gradient(90deg, rgba(99,102,241,0.05) 25%, rgba(99,102,241,0.11) 50%, rgba(99,102,241,0.05) 75%);
      background-size: 200% 100%;
      animation: skShimmer 1.6s ease infinite;
    }
    .pq-gen-line:nth-child(2) { animation-delay: 0.2s; width: 90%; }
    .pq-gen-line:nth-child(3) { animation-delay: 0.4s; width: 80%; }

    /* ── Context / Usage Insight Cards ── */
    .ctx-cards { display: flex; flex-direction: column; gap: 10px; }
    .ctx-card {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 13px 14px;
      border-radius: 16px;
      border: 1px solid transparent;
      animation: ctxCardIn 0.38s cubic-bezier(0.22,1,0.36,1) both;
    }
    .ctx-card:nth-child(1) { animation-delay: 0.04s; background: rgba(99,102,241,0.07); border-color: rgba(99,102,241,0.15); }
    .ctx-card:nth-child(2) { animation-delay: 0.10s; background: rgba(16,185,129,0.07); border-color: rgba(16,185,129,0.15); }
    .ctx-card:nth-child(3) { animation-delay: 0.16s; background: rgba(245,158,11,0.07); border-color: rgba(245,158,11,0.15); }
    .ctx-card:nth-child(n+4) { animation-delay: 0.22s; background: rgba(139,92,246,0.07); border-color: rgba(139,92,246,0.15); }
    @keyframes ctxCardIn {
      from { opacity:0; transform:translateX(-8px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .ctx-num {
      width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900;
    }
    .ctx-card:nth-child(1) .ctx-num { background: rgba(99,102,241,0.2); color: #a5b4fc; }
    .ctx-card:nth-child(2) .ctx-num { background: rgba(16,185,129,0.2); color: #6ee7b7; }
    .ctx-card:nth-child(3) .ctx-num { background: rgba(245,158,11,0.2); color: #fcd34d; }
    .ctx-card:nth-child(n+4) .ctx-num { background: rgba(139,92,246,0.2); color: #c4b5fd; }
    .ctx-text {
      flex: 1; font-size: 13px; line-height: 1.65;
      color: rgba(203,213,225,0.9);
      font-family: 'Merriweather', 'Noto Serif Bengali', serif;
    }
    .ctx-text-bold { font-weight: 800; color: #fff; }

    /* ── Entity Image Panel ── */
    .entity-img-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: rgba(10,10,16,0.98);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .entity-img-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 9px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
      flex-shrink: 0;
    }
    .entity-img-badge.person {
      background: rgba(99,102,241,0.15); color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.25);
    }
    .entity-img-badge.place {
      background: rgba(16,185,129,0.15); color: #6ee7b7;
      border: 1px solid rgba(16,185,129,0.25);
    }
    .entity-img-badge.other {
      background: rgba(100,116,139,0.15); color: #94a3b8;
      border: 1px solid rgba(100,116,139,0.2);
    }
    .entity-img-sources {
      display: flex; gap: 4px; flex: 1;
    }
    .entity-img-src-btn {
      padding: 5px 12px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
      background: rgba(255,255,255,0.04);
      color: rgba(140,160,200,0.55);
      transition: all 0.2s ease; outline: none;
      white-space: nowrap;
    }
    .entity-img-src-btn:hover { background: rgba(255,255,255,0.08); color: rgba(200,220,255,0.85); }
    .entity-img-src-btn.active {
      background: rgba(99,102,241,0.2); color: #a5b4fc;
      box-shadow: inset 0 0 0 1px rgba(99,102,241,0.3);

    .entity-img-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .entity-img-action-btn {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      color: rgba(140,160,200,0.6); cursor: pointer; text-decoration: none;
      transition: all 0.18s ease; outline: none;
    }
    .entity-img-action-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .entity-img-hint {
      padding: 7px 14px;
      font-size: 11px; color: rgba(120,140,180,0.55);
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      flex-shrink: 0;
    }
    .entity-img-hint-name {
      font-weight: 700; color: rgba(165,180,252,0.8);
    }

    /* ── Smart Instant Action Button ── */
    .smart-action-bar {
      display: flex; align-items: stretch; gap: 0;
      border-radius: 18px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      animation: smartActionIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes smartActionIn {
      from { opacity:0; transform:translateY(8px) scale(0.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    .smart-action-primary {
      flex: 1; display: flex; align-items: center; gap: 12px;
      padding: 14px 18px;
      background: linear-gradient(135deg, var(--sa-c1), var(--sa-c2));
      color: #fff; font-size: 13px; font-weight: 700;
      cursor: pointer; text-decoration: none;
      border: none; outline: none;
      transition: filter 0.18s ease;
    }
    .smart-action-primary:hover { filter: brightness(1.12); }
    .smart-action-primary:active { filter: brightness(0.92); }
    .smart-action-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 18px;
    }
    .smart-action-text { display: flex; flex-direction: column; gap: 2px; text-align: left; }
    .smart-action-label { font-size: 11px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.75; }
    .smart-action-name { font-size: 15px; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
    .smart-action-arrow {
      width: 44px; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.2); flex-shrink: 0;
      color: rgba(255,255,255,0.7); font-size: 18px;
    }

    @keyframes slideInTop { from{transform:translateY(-0.5rem);opacity:0} to{transform:translateY(0);opacity:1} }
    .slide-in-from-top-2 { animation:slideInTop 0.3s ease-out; }
    @keyframes slideInFromBottom2 { from{transform:translateY(0.5rem);opacity:0} to{transform:translateY(0);opacity:1} }
    .slide-in-from-bottom-2 { animation:slideInFromBottom2 0.3s ease-out; }
    .duration-300 { transition-duration:300ms; }
    .duration-500 { transition-duration:500ms; }
    .duration-700 { transition-duration:700ms; }
    .fade-in { animation:fadeIn 0.5s ease-out; }

    /* Model selector pill button container */

    /* ── Upload Burst Animation ── */
    @keyframes uploadPulse {
      0%   { transform: scale(0.85); opacity: 0; }
      30%  { transform: scale(1.08); opacity: 1; }
      70%  { transform: scale(1.04); opacity: 1; }
      100% { transform: scale(1.0);  opacity: 0.9; }
    }
    @keyframes uploadRing {
      0%   { transform: scale(0.6); opacity: 0.8; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    @keyframes uploadFloat {
      0%   { transform: translateY(0px) scale(1);   opacity: 1; }
      100% { transform: translateY(-60px) scale(0.4); opacity: 0; }
    }
    .upload-overlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.75);
      animation: fadeIn 0.15s ease-out;
    }
    .upload-burst {
      position: relative; display: flex; align-items: center; justify-content: center;
      width: 140px; height: 140px;
    }
    .upload-burst .burst-icon {
      width: 72px; height: 72px;
      background: #080808;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow:
        inset 0 0.3rem 0.9rem rgba(255,255,255,0.3),
        inset 0 -0.4rem 0.9rem rgba(255,255,255,0.5),
        0 0 40px rgba(255,255,255,0.15);
      animation: uploadPulse 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
      z-index: 2;
    }
    .upload-burst .burst-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      animation: uploadRing 0.9s ease-out forwards;
    }
    .upload-burst .burst-ring:nth-child(3) { animation-delay: 0.15s; border-color: rgba(255,255,255,0.2); }
    .upload-burst .burst-ring:nth-child(4) { animation-delay: 0.3s;  border-color: rgba(255,255,255,0.1); }
    .upload-burst .sparkle {
      position: absolute; font-size: 18px;
      animation: uploadFloat 0.9s ease-out forwards;
    }
    .upload-burst .sparkle:nth-child(5) { top: 10px; left: 50%; animation-delay: 0.05s; }
    .upload-burst .sparkle:nth-child(6) { top: 30px; left: 15%; animation-delay: 0.15s; font-size: 12px; }
    .upload-burst .sparkle:nth-child(7) { top: 30px; right: 15%; animation-delay: 0.25s; font-size: 14px; }
    .upload-label {
      margin-top: 24px;
      font-size: 10px; font-weight: 800; letter-spacing: 0.25em;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
      animation: fadeIn 0.3s ease-out 0.2s both;
    }

    }
    .ocr-up-head {

    .ocr-sk-short { width: 62%; }
    .ocr-sk::before {
      content: "";
      position: absolute; inset: -40% -60%;
      background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.1) 22%, rgba(255,255,255,0.2) 30%, transparent 44%);
      transform: translateX(-60%);

      background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.12) 22%, rgba(255,255,255,0.28) 28%, transparent 40%);
      transform: translateX(-55%);
      animation: ocr-glint 1.05s cubic-bezier(0.2,0.8,0.2,1) infinite;
      mix-blend-mode: screen;
    }
    .ocr-footer {

    @keyframes ocr-shimmer { to { transform: translateX(60%); } }
    @keyframes ocr-flow {

    .cyber-highlight {
      position: absolute;
      top: var(--padding);
      left: var(--padding);
      width: var(--item-width);
      height: calc(52px - var(--padding) * 2);
      z-index: 1; pointer-events: none;
      transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .cyber-highlight-inner {
      width: 100%; height: 100%; border-radius: 12px;
      background: linear-gradient(145deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid rgba(255,255,255,0.13);
      box-shadow: 0 0 18px var(--primary-glow), inset 0 0 12px rgba(0,240,255,0.15);
      position: relative;
      animation: cyber-neon-pulse 3s infinite ease-in-out;
    }
    .cyber-highlight-inner::after {
      content: ""; position: absolute; top: 0; left: 10%; width: 80%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.75), transparent);
      opacity: 0.8;
    }
    #cst-1:checked ~ .cyber-highlight { transform: translateX(0%); }
    #cst-2:checked ~ .cyber-highlight { transform: translateX(100%); }
    #cst-3:checked ~ .cyber-highlight { transform: translateX(200%); }
    #cst-4:checked ~ .cyber-highlight { transform: translateX(300%); }
    #cst-5:checked ~ .cyber-highlight { transform: translateX(400%); }
    #cst-6:checked ~ .cyber-highlight { transform: translateX(500%); }
    @keyframes cyber-neon-pulse {
      0%,100% { box-shadow: 0 0 18px var(--primary-glow), inset 0 0 12px rgba(0,240,255,0.15); }
      50%      { box-shadow: 0 0 26px var(--primary-glow), inset 0 0 20px rgba(0,240,255,0.28); }
    }

    /* ── Settings Neumorphic Drawer (Uiverse by ercnersoy) ── */
    .settings-neomorph {
      background: #1a1a1e;
      border: 1.5px solid rgba(255,255,255,0.07);
      box-shadow:
        inset 6px 6px 18px rgba(0,0,0,0.6),
        inset -6px -6px 18px rgba(255,255,255,0.03),
        0 -12px 48px rgba(0,0,0,0.5);
      transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
      overflow: hidden;
    }
    @keyframes slideOutDown {
      from { transform: translateY(0); opacity: 1; }
      to   { transform: translateY(100%); opacity: 0; }
    }
    .slide-out-down {
      animation: slideOutDown 0.24s cubic-bezier(0.32,0.72,0,1) forwards;
    }

    /* ── Spinning Words Loader (Uiverse by kennyotsu) ── */
    .spin-loader {
      --bg-color: #020202;
      display: flex;
      align-items: center;
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: 2.5rem;
      color: rgba(255,255,255,0.85);
      height: 52px;
      line-height: 52px;
    }
    .spin-loader .static-word {
      white-space: nowrap;
      margin-right: 10px;
    }
    .spin-words {
      overflow: hidden;
      position: relative;
      height: 52px;
    }
    .spin-words::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        var(--bg-color) 10%,
        transparent 30%,
        transparent 70%,
        var(--bg-color) 90%
      );
      z-index: 20;
    }
    .spin-word {
      display: block;
      height: 100%;
      padding-left: 8px;
      color: #a78bfa;
      font-style: italic;
      animation: spin_words 6s infinite;
    }
    @keyframes spin_words {
      8%  { transform: translateY(-102%); }
      16% { transform: translateY(-100%); }
      24% { transform: translateY(-202%); }
      33% { transform: translateY(-200%); }
      41% { transform: translateY(-302%); }
      50% { transform: translateY(-300%); }
      58% { transform: translateY(-402%); }
      66% { transform: translateY(-400%); }
      74% { transform: translateY(-502%); }
      83% { transform: translateY(-500%); }
      91% { transform: translateY(-602%); }
      100%{ transform: translateY(-600%); }
    }

    /* ── Morphing Shape Loader (Uiverse by mobinkakei) ── */
    .shape-loader {
      --path: rgba(255,255,255,0.18);
      --dot: #818cf8;
      --duration: 3s;
      width: 44px;
      height: 44px;
      position: relative;
      display: inline-block;
      margin: 0 16px;
    }
    .shape-loader:before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      position: absolute;
      display: block;
      background: var(--dot);
      top: 37px;
      left: 19px;
      transform: translate(-18px, -18px);
      animation: dotRect var(--duration) cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
    }
    .shape-loader svg { display: block; width: 100%; height: 100%; }
    .shape-loader svg rect,
    .shape-loader svg polygon,
    .shape-loader svg circle {
      fill: none;
      stroke: var(--path);
      stroke-width: 10px;
      stroke-linejoin: round;
      stroke-linecap: round;
    }
    .shape-loader svg polygon {
      stroke-dasharray: 145 76 145 76;
      stroke-dashoffset: 0;
      animation: pathTriangle var(--duration) cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
    }
    .shape-loader svg rect {
      stroke-dasharray: 192 64 192 64;
      stroke-dashoffset: 0;
      animation: pathRect var(--duration) cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
    }
    .shape-loader svg circle {
      stroke-dasharray: 150 50 150 50;
      stroke-dashoffset: 75;
      animation: pathCircle var(--duration) cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
    }
    .shape-loader.triangle { width: 48px; }
    .shape-loader.triangle:before {
      left: 21px;
      transform: translate(-10px, -18px);
      animation: dotTriangle var(--duration) cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
    }
    @keyframes pathTriangle {
      33% { stroke-dashoffset: 74; }
      66% { stroke-dashoffset: 147; }
      100% { stroke-dashoffset: 221; }
    }
    @keyframes dotTriangle {
      33% { transform: translate(0, 0); }
      66% { transform: translate(10px, -18px); }
      100% { transform: translate(-10px, -18px); }
    }
    @keyframes pathRect {
      25% { stroke-dashoffset: 64; }
      50% { stroke-dashoffset: 128; }
      75% { stroke-dashoffset: 192; }
      100% { stroke-dashoffset: 256; }
    }
    @keyframes dotRect {
      25% { transform: translate(0, 0); }
      50% { transform: translate(18px, -18px); }
      75% { transform: translate(0, -36px); }
      100% { transform: translate(-18px, -18px); }
    }
    @keyframes pathCircle {
      25% { stroke-dashoffset: 125; }
      50% { stroke-dashoffset: 175; }
      75% { stroke-dashoffset: 225; }
      100% { stroke-dashoffset: 275; }
    }

    /* ── Shine Card (Uiverse by 05akalan57) ── */
    .shine-card {
      position: relative;
      overflow: visible;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      padding: 1px;
      -webkit-box-reflect: below 8px linear-gradient(to bottom, rgba(0,0,0,0.0), rgba(0,0,0,0.35));
      filter: drop-shadow(0px 0px 8px rgba(120, 100, 255, 0.18));
    }
    .shine-card-inner {
      position: relative;
      border-radius: 19px;
      z-index: 1;
      background: #0d0d10;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .shine-orb {
      position: absolute;
      width: 120%;
      height: 260px;
      background: white;
      filter: blur(70px);
      opacity: 0;
      left: -10%;
      top: -60%;
      pointer-events: none;
      transition: opacity 0.4s ease;
      border-radius: 50%;
      z-index: 0;
    }
    .shine-card:hover .shine-orb { opacity: 0.07; }
    .shine-card:focus-within .shine-orb { opacity: 0.11; }

    /* ── Vertical Radio Glider (Uiverse by Smit-Prajapati) ── */
    .radio-container {
      --main-color: #a78bfa;
      --main-color-opacity: #a78bfa1c;
      --total-radio: 4;
      display: flex;
      flex-direction: column;
      position: relative;
      padding-left: 0.75rem;
    }
    .radio-container.scanning-radio { --main-color: #67e8f9; --main-color-opacity: #67e8f91c; --total-radio: 3; }
    .radio-container.structure-radio { --main-color: #fcd34d; --main-color-opacity: #fcd34d1c; --total-radio: 4; }
    .radio-container input { cursor: pointer; appearance: none; }
    .radio-container .glider-container {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(27,27,27,1) 50%, rgba(0,0,0,0) 100%);
      width: 1px;
    }
    .radio-container .glider-container .glider {
      position: relative;
      height: calc(100% / var(--total-radio));
      width: 100%;
      background: linear-gradient(0deg, rgba(0,0,0,0) 0%, var(--main-color) 50%, rgba(0,0,0,0) 100%);
      transition: transform 0.5s cubic-bezier(0.37, 1.95, 0.66, 0.56);
    }
    .radio-container .glider-container .glider::before {
      content: ""; position: absolute; height: 60%; width: 300%;
      top: 50%; transform: translateY(-50%);
      background: var(--main-color); filter: blur(10px);
    }
    .radio-container .glider-container .glider::after {
      content: ""; position: absolute; left: 0; height: 100%; width: 180px;
      background: linear-gradient(90deg, var(--main-color-opacity) 0%, rgba(0,0,0,0) 100%);
    }
    .radio-container label {
      cursor: pointer; padding: 0.85rem 1rem; position: relative;
      color: rgba(148,163,184,0.5);
      transition: all 0.3s ease-in-out;
      display: flex; align-items: center; gap: 10px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      border-radius: 12px;
    }
    .radio-container label:hover { background: rgba(255,255,255,0.03); color: rgba(148,163,184,0.8); }
    .radio-container label .r-icon { font-size: 15px; flex-shrink: 0; line-height: 1; opacity: 0.6; transition: opacity 0.3s; }
    .radio-container label .r-sub { display: block; font-size: 9px; font-weight: 500; letter-spacing: 0.05em; text-transform: none; opacity: 0.6; margin-top: 2px; }
    .radio-container input:checked + label { color: var(--main-color); }
    .radio-container input:checked + label .r-icon { opacity: 1; }
    .radio-container input:nth-of-type(1):checked ~ .glider-container .glider { transform: translateY(0); }
    .radio-container input:nth-of-type(2):checked ~ .glider-container .glider { transform: translateY(100%); }

    .radio-container input:nth-of-type(5):checked ~ .glider-container .glider { transform: translateY(400%); }
